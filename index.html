<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forest Diorama</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #87b9e0; }
    canvas { display: block; }

    #log {
      position: fixed;
      top: 16px;
      left: 16px;
      max-width: 320px;
      max-height: 40vh;
      overflow-y: auto;
      padding: 12px 14px;
      font: 13px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
      color: #eaf6ff;
      background: rgba(12, 28, 20, 0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      pointer-events: auto;
      user-select: none;
    }
    #log::-webkit-scrollbar { width: 7px; }
    #log::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.25); border-radius: 4px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log h1 {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 8px;
      font-weight: 600;
      position: sticky;
      top: 0;
      background: rgba(12, 28, 20, 0.85);
      padding-bottom: 6px;
    }
    #log .entry { opacity: 0.92; }
    #log .entry + .entry { margin-top: 3px; }

    #hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 7px 14px;
      font: 12px/1 ui-sans-serif, system-ui, sans-serif;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(12, 28, 20, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="log">
    <h1>Scene Log</h1>
  </div>
  <div id="hint">drag to orbit · scroll to zoom · add ?timelapse to the URL to watch it build</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
